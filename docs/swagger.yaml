  # ── Invitation send ────────────────────────────────────────────────────────

  /api/v1/invitations/{id}/send:
    post:
      tags: [Invitations]
      summary: Queue invitations for all unsent guests
      description: |
        Publishes invitation messages to RabbitMQ for delivery via email and WhatsApp.
        Requires the event's bill to be paid — returns **402** otherwise.
        Only guests whose `invitation_sent` is `false` are queued.
      parameters:
        - name: id
          in: path
          required: true
          description: Invitation ID
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Invitations queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvitationSendResponse"
        "402":
          description: Payment required — event bill not paid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Invitation not found

  # ── WhatsApp webhook ───────────────────────────────────────────────────────

  /api/v1/webhooks/whatsapp:
    get:
      tags: [Webhooks]
      summary: WhatsApp webhook verification (Meta handshake)
      description: |
        Called by Meta/Facebook during webhook registration.
        Responds with `hub.challenge` when `hub.mode=subscribe` and
        `hub.verify_token` matches the configured verify token.
      security: []
      parameters:
        - name: hub.mode
          in: query
          required: true
          schema:
            type: string
            enum: [subscribe]
        - name: hub.verify_token
          in: query
          required: true
          schema:
            type: string
        - name: hub.challenge
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Verification successful — challenge echoed back
          content:
            text/plain:
              schema:
                type: string
        "403":
          description: Token mismatch
    post:
      tags: [Webhooks]
      summary: Receive incoming WhatsApp messages and status updates
      description: |
        Facebook posts message and status callback payloads here.
        Always responds 200 immediately; payloads are processed asynchronously.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Acknowledged
