  # ── Files ──────────────────────────────────────────────────────────────────

  /api/v1/files/{collection}:
    post:
      tags: [Files]
      summary: Upload a file to a collection
      description: |
        A `record_id` UUID is generated server-side and returned in the response.
        Use the returned `record_id` and `filename` for subsequent GET / DELETE calls.
        Public collections (qr_codes, event_banners, avatars) do not require auth.
        Protected collections (guest_lists, attachments) require a Bearer token.
      parameters:
        - name: collection
          in: path
          required: true
          schema:
            type: string
            enum: [qr_codes, event_banners, avatars, guest_lists, attachments]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "201":
          description: File uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileRecord"
        "404":
          description: Unknown collection
        "413":
          description: File too large
        "415":
          description: MIME type not allowed
  /api/v1/files/{collection}/{record_id}:
    get:
      tags: [Files]
      summary: List files for a record
      parameters:
        - name: collection
          in: path
          required: true
          schema:
            type: string
        - name: record_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: List of files
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FileRecord"

  /api/v1/files/{collection}/{record_id}/{filename}:
    get:
      tags: [Files]
      summary: Download / serve a file
      parameters:
        - name: collection
          in: path
          required: true
          schema:
            type: string
        - name: record_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: filename
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: File content (streamed)
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          description: File not found
    delete:
      tags: [Files]
      summary: Delete a file
      parameters:
        - name: collection
          in: path
          required: true
          schema:
            type: string
        - name: record_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: filename
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: File deleted
        "404":
          description: File not found

